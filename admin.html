<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — E-PLUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#045283; --accent:#0a8acb; --dark:#020915; --gold:#f4b41a; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Cairo',sans-serif; background:var(--dark); color:#fff; min-height:100vh; }

    /* ══ LOGIN ══ */
    .login-screen{
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
      background:radial-gradient(circle at top,rgba(4,82,131,0.5),var(--dark) 60%);
    }
    .login-box{
      background:rgba(6,21,40,0.95); border:1px solid rgba(4,82,131,0.5); border-radius:24px;
      padding:40px 32px; width:100%; max-width:400px; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
    }
    .login-logo{ margin-bottom:10px; display:flex; justify-content:center; }
    .login-logo img{
      width:80px; height:80px; object-fit:contain;
      /* ✅ حذف drop-shadow */
    }
    .login-title{
      font-size:22px; font-weight:900; margin-bottom:4px;
      background:linear-gradient(135deg,#fff,#7cc8f0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .login-sub{ font-size:13px; color:rgba(180,210,240,0.6); margin-bottom:28px; }
    .inp{
      width:100%; padding:13px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.08);
      background:rgba(2,10,22,0.9); color:#fff; font-size:14px; font-family:inherit;
      outline:none; margin-bottom:12px; transition:border-color 0.3s;
    }
    .inp:focus{ border-color:var(--accent); box-shadow:0 0 0 1px rgba(10,138,203,0.4); }
    .btn-login{
      width:100%; padding:14px; border:none; border-radius:14px;
      background:linear-gradient(135deg,#045283,#0a8acb); color:#fff;
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all 0.3s ease; margin-top:4px;
    }
    .btn-login:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(4,82,131,0.5); }
    .login-error{ color:#e86b6b; font-size:13px; margin-top:10px; display:none; }

    /* ══ DASHBOARD ══ */
    .dashboard{ display:none; min-height:100vh; flex-direction:column; }
    .topbar{
      background:rgba(6,21,40,0.97); border-bottom:1px solid rgba(4,82,131,0.3);
      padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100; gap:12px;
    }
    .topbar-title{
      font-size:17px; font-weight:900; display:flex; align-items:center; gap:10px;
      background:linear-gradient(135deg,#fff,#7cc8f0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .topbar-title img{
      width:30px; height:30px; object-fit:contain;
      /* ✅ حذف drop-shadow من أيقونة الـ topbar */
      flex-shrink:0;
    }
    .topbar-right{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .admin-name{
      font-size:12px; font-weight:600; color:rgba(180,215,245,0.7);
      padding:6px 12px; border-radius:999px;
      background:rgba(4,82,131,0.15); border:1px solid rgba(4,82,131,0.3);
      max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* ✅ زر الرجوع للصفحة الرئيسية */
    .btn-home{
      padding:8px 16px; border-radius:999px;
      border:1px solid rgba(10,138,203,0.4);
      background:rgba(10,138,203,0.1); color:#7cc8f0;
      cursor:pointer; font-size:13px; font-weight:700;
      font-family:inherit; transition:all 0.25s;
      display:flex; align-items:center; gap:6px; white-space:nowrap;
      text-decoration:none;
    }
    .btn-home:hover{
      background:rgba(10,138,203,0.25);
      border-color:rgba(10,138,203,0.7);
      transform:translateY(-1px);
    }

    .btn-logout{
      padding:8px 16px; border-radius:999px; border:1px solid rgba(232,107,107,0.4);
      background:rgba(232,107,107,0.1); color:#e86b6b; cursor:pointer;
      font-size:13px; font-weight:700; font-family:inherit; transition:all 0.25s; white-space:nowrap;
    }
    .btn-logout:hover{ background:rgba(232,107,107,0.25); }

    .dashboard-body{ flex:1; padding:28px 20px; max-width:820px; margin:0 auto; width:100%; }

    /* ══ STATS ══ */
    .stats-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px; }
    @media(min-width:600px){ .stats-grid{ grid-template-columns:repeat(4,1fr); } }
    .stat-card{
      background:rgba(6,21,40,0.8); border:1px solid rgba(4,82,131,0.25); border-radius:18px;
      padding:18px 16px; text-align:center; transition:border-color 0.25s,transform 0.25s;
    }
    .stat-card:hover{ border-color:rgba(10,138,203,0.5); transform:translateY(-2px); }
    .stat-icon{ font-size:26px; margin-bottom:6px; }
    .stat-num{
      font-size:28px; font-weight:900;
      background:linear-gradient(135deg,#0a8acb,#fff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .stat-label{ font-size:11px; color:rgba(160,200,235,0.6); font-weight:600; margin-top:3px; }

    /* ══ TABS ══ */
    .tabs{
      display:flex; gap:10px; margin-bottom:22px;
      border-bottom:1px solid rgba(4,82,131,0.2);
    }
    .tab-btn{
      padding:10px 20px; border:none; border-bottom:3px solid transparent;
      background:transparent; color:rgba(180,215,245,0.6);
      font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all 0.25s; border-radius:8px 8px 0 0; margin-bottom:-1px;
    }
    .tab-btn:hover{ color:#fff; background:rgba(4,82,131,0.1); }
    .tab-btn.active{ color:#fff; border-bottom-color:#0a8acb; background:rgba(10,138,203,0.08); }
    .tab-panel{ display:none; }
    .tab-panel.active{ display:block; }

    /* ══ PANEL CARD ══ */
    .panel-card{
      background:rgba(6,21,40,0.8); border:1px solid rgba(4,82,131,0.3); border-radius:20px;
      padding:24px; margin-bottom:24px;
    }
    .panel-card-title{
      font-size:16px; font-weight:800; color:#fff; margin-bottom:20px;
      display:flex; align-items:center; gap:8px;
    }
    .form-label{ font-size:13px; font-weight:600; color:rgba(200,225,245,0.8); margin-bottom:6px; display:block; }
    .form-group{ margin-bottom:16px; }
    textarea.inp{ resize:vertical; min-height:100px; }

    /* ══ UPLOAD ══ */
    .upload-area{
      border:2px dashed rgba(10,138,203,0.4); border-radius:16px;
      padding:32px; text-align:center; cursor:pointer; transition:all 0.3s;
      background:rgba(4,82,131,0.05); position:relative; overflow:hidden;
    }
    .upload-area:hover{ border-color:rgba(10,138,203,0.8); background:rgba(4,82,131,0.12); }
    .upload-area input[type="file"]{
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .upload-icon{ font-size:32px; margin-bottom:8px; }
    .upload-text{ font-size:13px; color:rgba(180,215,245,0.7); }
    .upload-preview{
      width:100%; height:auto; object-fit:contain;
      border-radius:12px; margin-top:14px; display:none;
      background:rgba(2,9,21,0.6); border:1px solid rgba(4,82,131,0.2);
    }
    .progress-wrap{
      background:rgba(2,10,22,0.6); border-radius:999px; overflow:hidden;
      height:8px; margin-top:10px; display:none;
    }
    .progress-bar{
      height:100%; background:linear-gradient(90deg,#045283,#0a8acb);
      border-radius:999px; transition:width 0.4s; width:0%;
    }

    /* ══ BUTTONS ══ */
    .btn-submit{
      width:100%; padding:14px; border:none; border-radius:14px;
      background:linear-gradient(135deg,#045283,#0a8acb); color:#fff;
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all 0.3s ease; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-submit:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(4,82,131,0.5); }
    .btn-submit:disabled{ opacity:0.5; pointer-events:none; }

    .type-toggle{ display:flex; gap:10px; margin-bottom:20px; }
    .type-btn{
      flex:1; padding:12px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(2,10,22,0.7); color:rgba(200,225,245,0.7);
      cursor:pointer; font-size:14px; font-weight:700; font-family:inherit;
      transition:all 0.25s; text-align:center;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .type-btn img{ width:22px; height:22px; object-fit:contain; }
    .type-btn.active{
      background:rgba(10,138,203,0.2); border-color:rgba(10,138,203,0.6);
      color:#fff; box-shadow:0 0 16px rgba(10,138,203,0.25);
    }

    /* ══ ANN LIST ══ */
    .ann-list{ display:flex; flex-direction:column; gap:12px; }
    .ann-item{
      display:flex; align-items:center; gap:14px;
      background:rgba(2,10,22,0.7); border:1px solid rgba(4,82,131,0.2);
      border-radius:14px; padding:14px 16px; transition:border-color 0.25s;
    }
    .ann-item:hover{ border-color:rgba(10,138,203,0.4); }

    /* ✅ hidden state للإعلان المخفي */
    .ann-item.is-hidden{
      opacity:0.5;
      border-color:rgba(255,200,0,0.2);
      background:rgba(50,40,0,0.35);
    }
    .ann-item.is-hidden .ann-item-title::after{
      content:' 👁‍🗨 مخفي';
      font-size:11px; color:rgba(255,200,80,0.7);
      font-weight:600; margin-right:6px;
    }

    .ann-item-thumb{
      width:54px; height:54px; border-radius:10px; flex-shrink:0;
      background:rgba(4,82,131,0.15); display:flex; align-items:center; justify-content:center;
      font-size:22px; border:1px solid rgba(4,82,131,0.2); overflow:hidden;
    }
    .ann-item-thumb img{ width:100%; height:100%; object-fit:cover; }
    .ann-item-info{ flex:1; min-width:0; }
    .ann-item-title{
      font-size:14px; font-weight:700; color:#fff; margin-bottom:3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .ann-item-meta{ font-size:11px; color:rgba(150,195,230,0.55); }

    /* ✅ أزرار الإعلان */
    .ann-item-btns{ display:flex; gap:8px; flex-shrink:0; }

    .btn-del{
      padding:7px 14px; border-radius:10px; border:1px solid rgba(232,107,107,0.3);
      background:rgba(232,107,107,0.08); color:#e86b6b; cursor:pointer;
      font-size:12px; font-weight:700; font-family:inherit; transition:all 0.25s;
    }
    .btn-del:hover{ background:rgba(232,107,107,0.25); }

    /* ✅ زر الإخفاء */
    .btn-hide{
      padding:7px 14px; border-radius:10px;
      border:1px solid rgba(255,200,0,0.3);
      background:rgba(255,200,0,0.07); color:#f4cc50;
      cursor:pointer; font-size:12px; font-weight:700;
      font-family:inherit; transition:all 0.25s; white-space:nowrap;
    }
    .btn-hide:hover{ background:rgba(255,200,0,0.18); }
    .btn-hide.is-hidden{
      border-color:rgba(10,138,203,0.4);
      background:rgba(10,138,203,0.1); color:#7cc8f0;
    }
    .btn-hide.is-hidden:hover{ background:rgba(10,138,203,0.22); }

    .empty-msg{ color:rgba(180,210,240,0.4); font-size:14px; text-align:center; padding:20px; }

    /* ══ CONFIRM MODAL ══ */
    .confirm-overlay{
      position:fixed; inset:0; z-index:9000;
      background:rgba(2,9,21,0.85); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .confirm-overlay.active{ opacity:1; pointer-events:all; }
    .confirm-box{
      background:rgba(6,21,40,0.98); border:1px solid rgba(232,107,107,0.4);
      border-radius:20px; padding:28px 24px; max-width:360px; width:100%; text-align:center;
      transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .confirm-overlay.active .confirm-box{ transform:scale(1); }
    .confirm-icon{ font-size:40px; margin-bottom:12px; }
    .confirm-title{ font-size:18px; font-weight:800; margin-bottom:8px; color:#fff; }
    .confirm-msg{ font-size:13px; color:rgba(200,225,245,0.7); margin-bottom:22px; line-height:1.6; }
    .confirm-btns{ display:flex; gap:10px; }
    .confirm-btns button{
      flex:1; padding:12px; border-radius:12px; border:none;
      font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; transition:all 0.25s;
    }
    .btn-cancel-confirm{
      background:rgba(255,255,255,0.06); color:rgba(200,225,245,0.8);
      border:1px solid rgba(255,255,255,0.1) !important;
    }
    .btn-cancel-confirm:hover{ background:rgba(255,255,255,0.12); }
    .btn-ok-confirm{ background:linear-gradient(135deg,#8b0000,#e86b6b); color:#fff; }
    .btn-ok-confirm:hover{ box-shadow:0 8px 20px rgba(232,107,107,0.4); transform:translateY(-1px); }

    /* ══ TOAST ══ */
    .toast{
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:linear-gradient(135deg,#045283,#0a

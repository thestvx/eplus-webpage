<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — E-PLUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#045283; --accent:#0a8acb; --dark:#020915; --gold:#f4b41a; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Cairo',sans-serif; background:var(--dark); color:#fff; min-height:100vh; }

    .login-screen{
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
      background:radial-gradient(circle at top,rgba(4,82,131,0.5),var(--dark) 60%);
    }
    .login-box{
      background:rgba(6,21,40,0.95); border:1px solid rgba(4,82,131,0.5); border-radius:24px;
      padding:40px 32px; width:100%; max-width:400px; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
    }
    .login-logo{ font-size:36px; margin-bottom:8px; }
    .login-title{ font-size:22px; font-weight:900; margin-bottom:4px;
      background:linear-gradient(135deg,#fff,#7cc8f0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .login-sub{ font-size:13px; color:rgba(180,210,240,0.6); margin-bottom:28px; }
    .inp{
      width:100%; padding:13px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.08);
      background:rgba(2,10,22,0.9); color:#fff; font-size:14px; font-family:inherit;
      outline:none; margin-bottom:12px; transition:border-color 0.3s;
    }
    .inp:focus{ border-color:var(--accent); box-shadow:0 0 0 1px rgba(10,138,203,0.4); }
    .btn-login{
      width:100%; padding:14px; border:none; border-radius:14px;
      background:linear-gradient(135deg,#045283,#0a8acb); color:#fff;
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all 0.3s ease; margin-top:4px;
    }
    .btn-login:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(4,82,131,0.5); }
    .login-error{ color:#e86b6b; font-size:13px; margin-top:10px; display:none; }

    .dashboard{ display:none; min-height:100vh; flex-direction:column; }
    .topbar{
      background:rgba(6,21,40,0.97); border-bottom:1px solid rgba(4,82,131,0.3);
      padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .topbar-title{ font-size:18px; font-weight:900;
      background:linear-gradient(135deg,#fff,#7cc8f0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .btn-logout{
      padding:8px 18px; border-radius:999px; border:1px solid rgba(232,107,107,0.4);
      background:rgba(232,107,107,0.1); color:#e86b6b; cursor:pointer;
      font-size:13px; font-weight:700; font-family:inherit; transition:all 0.25s;
    }
    .btn-logout:hover{ background:rgba(232,107,107,0.25); }
    .dashboard-body{ flex:1; padding:28px 20px; max-width:780px; margin:0 auto; width:100%; }

    .panel-card{
      background:rgba(6,21,40,0.8); border:1px solid rgba(4,82,131,0.3); border-radius:20px;
      padding:24px; margin-bottom:24px;
    }
    .panel-card-title{ font-size:16px; font-weight:800; color:#fff; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
    .form-label{ font-size:13px; font-weight:600; color:rgba(200,225,245,0.8); margin-bottom:6px; display:block; }
    .form-group{ margin-bottom:16px; }
    textarea.inp{ resize:vertical; min-height:100px; }

    .upload-area{
      border:2px dashed rgba(10,138,203,0.4); border-radius:16px;
      padding:32px; text-align:center; cursor:pointer; transition:all 0.3s;
      background:rgba(4,82,131,0.05); position:relative; overflow:hidden;
    }
    .upload-area:hover{ border-color:rgba(10,138,203,0.8); background:rgba(4,82,131,0.12); }
    .upload-area input[type="file"]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon{ font-size:32px; margin-bottom:8px; }
    .upload-text{ font-size:13px; color:rgba(180,215,245,0.7); }
    .upload-preview{ width:100%; max-height:200px; object-fit:cover; border-radius:12px; margin-top:14px; display:none; }

    .progress-wrap{ background:rgba(2,10,22,0.6); border-radius:999px; overflow:hidden; height:8px; margin-top:10px; display:none; }
    .progress-bar{ height:100%; background:linear-gradient(90deg,#045283,#0a8acb); border-radius:999px; transition:width 0.4s; width:0%; }

    .btn-submit{
      width:100%; padding:14px; border:none; border-radius:14px;
      background:linear-gradient(135deg,#045283,#0a8acb); color:#fff;
      font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
      transition:all 0.3s ease; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-submit:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(4,82,131,0.5); }
    .btn-submit:disabled{ opacity:0.5; pointer-events:none; }

    .type-toggle{ display:flex; gap:10px; margin-bottom:20px; }
    .type-btn{
      flex:1; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(2,10,22,0.7); color:rgba(200,225,245,0.7);
      cursor:pointer; font-size:14px; font-weight:700; font-family:inherit;
      transition:all 0.25s; text-align:center;
    }
    .type-btn.active{
      background:rgba(10,138,203,0.2); border-color:rgba(10,138,203,0.6);
      color:#fff; box-shadow:0 0 16px rgba(10,138,203,0.25);
    }

    .ann-list{ display:flex; flex-direction:column; gap:12px; }
    .ann-item{
      display:flex; align-items:center; gap:14px;
      background:rgba(2,10,22,0.7); border:1px solid rgba(4,82,131,0.2);
      border-radius:14px; padding:14px 16px; transition:border-color 0.25s;
    }
    .ann-item:hover{ border-color:rgba(10,138,203,0.4); }
    .ann-item-thumb{
      width:54px; height:54px; border-radius:10px; flex-shrink:0;
      background:rgba(4,82,131,0.15); display:flex; align-items:center; justify-content:center;
      font-size:22px; border:1px solid rgba(4,82,131,0.2); overflow:hidden;
    }
    .ann-item-thumb img{ width:100%; height:100%; object-fit:cover; }
    .ann-item-info{ flex:1; min-width:0; }
    .ann-item-title{ font-size:14px; font-weight:700; color:#fff; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ann-item-meta{ font-size:11px; color:rgba(150,195,230,0.55); }
    .btn-del{
      padding:7px 14px; border-radius:10px; border:1px solid rgba(232,107,107,0.3);
      background:rgba(232,107,107,0.08); color:#e86b6b; cursor:pointer;
      font-size:12px; font-weight:700; font-family:inherit; transition:all 0.25s; flex-shrink:0;
    }
    .btn-del:hover{ background:rgba(232,107,107,0.25); }
    .empty-msg{ color:rgba(180,210,240,0.4); font-size:14px; text-align:center; padding:20px; }

    .toast{
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:linear-gradient(135deg,#045283,#0a8acb); color:#fff;
      padding:12px 24px; border-radius:14px; font-size:14px; font-weight:700;
      box-shadow:0 8px 30px rgba(0,0,0,0.5); z-index:9999;
      transition:transform 0.4s cubic-bezier(0.19,1,0.22,1); white-space:nowrap;
    }
    .toast.show{ transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="login-logo">🛡️</div>
      <div class="login-title">لوحة الإدارة</div>
      <div class="login-sub">E-PLUS Center — Admin Panel</div>
      <input class="inp" type="email"    id="email-inp"    placeholder="البريد الإلكتروني">
      <input class="inp" type="password" id="password-inp" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">تسجيل الدخول 🔐</button>
      <div class="login-error" id="login-error">بيانات غير صحيحة، حاول مجدداً</div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <div class="topbar-title">🛡️ لوحة إدارة E-PLUS</div>
      <button class="btn-logout" onclick="doLogout()">تسجيل الخروج</button>
    </div>
    <div class="dashboard-body">

      <div class="panel-card">
        <div class="panel-card-title">➕ إضافة إعلان جديد</div>
        <div class="type-toggle">
          <button class="type-btn active" id="type-text-btn" onclick="switchType('text')">📝 إعلان كتابي</button>
          <button class="type-btn"        id="type-img-btn"  onclick="switchType('image')">🖼 إعلان بصورة</button>
        </div>
        <div class="form-group">
          <label class="form-label">عنوان الإعلان *</label>
          <input class="inp" type="text" id="ann-title" placeholder="مثال: انطلاق التسجيلات للدورة الجديدة!">
        </div>
        <div class="form-group">
          <label class="form-label">نص الإعلان (اختياري)</label>
          <textarea class="inp" id="ann-text" placeholder="اكتب تفاصيل الإعلان هنا..."></textarea>
        </div>
        <div class="form-group" id="img-group" style="display:none;">
          <label class="form-label">رفع صورة الإعلان</label>
          <div class="upload-area">
            <input type="file" id="img-file" accept="image/*" onchange="onFileSelect(event)">
            <div class="upload-icon">📸</div>
            <div class="upload-text">اضغط لرفع صورة (JPG, PNG, WEBP)</div>
          </div>
          <img class="upload-preview" id="upload-preview" alt="preview">
          <div class="progress-wrap" id="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <button class="btn-submit" id="submit-ann-btn" onclick="publishAnnouncement()">
          <span>🚀 نشر الإعلان</span>
        </button>
      </div>

      <div class="panel-card">
        <div class="panel-card-title">📋 الإعلانات الحالية</div>
        <div class="ann-list" id="admin-ann-list">
          <div class="empty-msg">جاري التحميل...</div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    // ── Firebase Config ──
    const firebaseConfig = {
      apiKey:            "AIzaSyCtb6RPW5sq5zK5JMmTYlBFEnQQZfVoI7s",
      authDomain:        "epluscenter-panel.firebaseapp.com",
      projectId:         "epluscenter-panel",
      storageBucket:     "epluscenter-panel.firebasestorage.app",
      messagingSenderId: "1000462675381",
      appId:             "1:1000462675381:web:b2156128337f7c11c17dfc"
    };

    // ── Cloudinary Config ──
    const CLOUDINARY_CLOUD  = 'dvxyom2xg';
    const CLOUDINARY_PRESET = 'EplusCenter';

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let annType      = 'text';
    let fileToUpload = null;

    // ── Auth State ──
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display    = 'flex';
        loadAnnouncements();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('dashboard').style.display    = 'none';
      }
    });

    window.doLogin = async () => {
      const email = document.getElementById('email-inp').value.trim();
      const pass  = document.getElementById('password-inp').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try { await signInWithEmailAndPassword(auth, email, pass); }
      catch { errEl.style.display = 'block'; }
    };

    window.doLogout = () => signOut(auth);

    // ── Type Switch ──
    window.switchType = (type) => {
      annType = type;
      document.getElementById('type-text-btn').classList.toggle('active', type === 'text');
      document.getElementById('type-img-btn').classList.toggle('active',  type === 'image');
      document.getElementById('img-group').style.display = type === 'image' ? 'block' : 'none';
    };

    // ── File Select ──
    window.onFileSelect = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      fileToUpload = file;
      const preview = document.getElementById('upload-preview');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    };

    // ── Publish ──
    window.publishAnnouncement = async () => {
      const title = document.getElementById('ann-title').value.trim();
      const text  = document.getElementById('ann-text').value.trim();
      if (!title) { showToast('⚠️ يرجى كتابة عنوان الإعلان'); return; }

      const btn = document.getElementById('submit-ann-btn');
      btn.disabled = true;
      btn.innerHTML = '<span>⏳ جاري النشر...</span>';

      try {
        let imageUrl = null;
        let publicId = null;

        if (annType === 'image' && fileToUpload) {
          const progressWrap = document.getElementById('progress-wrap');
          const progressBar  = document.getElementById('progress-bar');
          progressWrap.style.display = 'block';
          progressBar.style.width = '30%';

          const formData = new FormData();
          formData.append('file', fileToUpload);
          formData.append('upload_preset', CLOUDINARY_PRESET);

          const res  = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,
            { method: 'POST', body: formData }
          );
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);

          imageUrl = data.secure_url;
          publicId = data.public_id;
          progressBar.style.width = '100%';
          setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600);
        }

        await addDoc(collection(db, 'announcements'), {
          title,
          text:      text || '',
          imageUrl:  imageUrl || null,
          publicId:  publicId || null,
          createdAt: serverTimestamp()
        });

        showToast('✅ تم نشر الإعلان بنجاح!');
        document.getElementById('ann-title').value             = '';
        document.getElementById('ann-text').value              = '';
        document.getElementById('upload-preview').style.display = 'none';
        document.getElementById('img-file').value              = '';
        fileToUpload = null;

      } catch(err) {
        showToast('❌ خطأ: ' + err.message);
      }

      btn.disabled = false;
      btn.innerHTML = '<span>🚀 نشر الإعلان</span>';
    };

    // ── Load Announcements ──
    function loadAnnouncements() {
      const q = query(collection(db, 'announcements'), orderBy('createdAt', 'desc'));
      onSnapshot(q, snap => {
        const listEl = document.getElementById('admin-ann-list');
        if (snap.empty) {
          listEl.innerHTML = '<div class="empty-msg">لا توجد إعلانات حتى الآن</div>';
          return;
        }
        listEl.innerHTML = '';
        snap.forEach(d => {
          const data    = d.data();
          const dateStr = data.createdAt?.toDate
            ? data.createdAt.toDate().toLocaleDateString('ar-DZ', { year:'numeric', month:'long', day:'numeric' })
            : '—';
          const item = document.createElement('div');
          item.className = 'ann-item';
          item.innerHTML = `
            <div class="ann-item-thumb">
              ${data.imageUrl ? `<img src="${data.imageUrl}" alt="">` : '📢'}
            </div>
            <div class="ann-item-info">
              <div class="ann-item-title">${data.title}</div>
              <div class="ann-item-meta">📅 ${dateStr} · ${data.imageUrl ? '🖼 صورة' : '📝 نص'}</div>
            </div>
            <button class="btn-del" onclick="deleteAnn('${d.id}')">🗑 حذف</button>`;
          listEl.appendChild(item);
        });
      });
    }

    // ── Delete ──
    window.deleteAnn = async (id) => {
      if (!confirm('هل أنت متأكد من حذف هذا الإعلان؟')) return;
      try {
        await deleteDoc(doc(db, 'announcements', id));
        showToast('🗑 تم حذف الإعلان');
      } catch(err) {
        showToast('❌ ' + err.message);
      }
    };

    // ── Toast ──
    window.showToast = (msg) => {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    };
  </script>
</body>
</html>

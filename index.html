<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-PLUS Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="squares-canvas" class="squares-bg"></canvas>
  <div class="bg-animated"></div>
  <div class="grid-pattern"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="lang-toggle" id="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ar')" id="btn-ar">🇸🇦 عربي</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
  </div>

  <div class="main-content">
    <div class="logo-container">
      <div class="logo-image-wrapper">
        <img src="images/eplus-logo.jpg" alt="E-PLUS Center Logo" class="logo-image">
      </div>
      <div class="logo-badge" data-i18n="badge">✦ Your journey to success starts here ✦</div>
      <h1 class="logo-title" data-i18n="title">EDUCATION PLUS CENTER</h1>
      <p class="logo-subtitle" data-i18n="subtitle">Register for Courses & Educational Programs</p>
    </div>

    <!-- الأزرار الخمسة -->
    <div class="buttons-grid">
      <button class="reg-btn reg-btn-1" onclick="openModal('support')">
        <span class="btn-icon">📚</span>
        <span class="btn-content">
          <span class="btn-label" data-i18n="btn1">تسجيلات الدعم</span>
        </span>
      </button>
      <button class="reg-btn reg-btn-2" onclick="openModal('lang')">
        <span class="btn-icon">🌐</span>
        <span class="btn-content">
          <span class="btn-label" data-i18n="btn2">دورات اللغات</span>
        </span>
      </button>
      <button class="reg-btn reg-btn-3" onclick="openModal('vip')">
        <span class="btn-icon">⭐</span>
        <span class="btn-content">
          <span class="btn-label" data-i18n="btn3">دروس VIP</span>
        </span>
      </button>
      <button class="reg-btn reg-btn-4" onclick="openModal('ielts')">
        <span class="btn-icon">🎓</span>
        <span class="btn-content">
          <span class="btn-label" data-i18n="btn4">اختبار IELTS</span>
        </span>
      </button>
      <button class="reg-btn reg-btn-5" onclick="openModal('online')">
        <span class="btn-icon">💻</span>
        <span class="btn-content">
          <span class="btn-label" data-i18n="btn5">دورات أونلاين</span>
        </span>
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
    <div class="modal-box" id="modal-box">

      <div id="form-view">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">نموذج التسجيل</div>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>

        <form id="reg-form" onsubmit="submitForm(event)" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">
                <span data-i18n="firstName">الاسم</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="firstName" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">
                <span data-i18n="lastName">اللقب</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="lastName" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="birthDate">
                <span data-i18n="birthDate">تاريخ الميلاد</span><span>*</span>
              </label>
              <input class="form-input" type="date" id="birthDate" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="birthPlace">
                <span data-i18n="birthPlace">مكان الميلاد</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="birthPlace" required>
            </div>
          </div>

          <!-- المستوى الدراسي — دعم فقط -->
          <div class="form-group" id="eduLevelGroup" style="display:none;">
            <label class="form-label" for="eduLevel">
              <span data-i18n="eduLevel">المستوى الدراسي</span><span>*</span>
            </label>
            <select class="form-input" id="eduLevel" onchange="onEduLevelChange()">
              <option value="">-- اختر المستوى --</option>
              <optgroup label="━━ ما قبل الابتدائي ━━">
                <option value="تحضيري">تحضيري</option>
              </optgroup>
              <optgroup label="━━ المرحلة الابتدائية ━━">
                <option value="أولى ابتدائي">أولى ابتدائي</option>
                <option value="ثانية ابتدائي">ثانية ابتدائي</option>
                <option value="ثالثة ابتدائي">ثالثة ابتدائي</option>
                <option value="رابعة ابتدائي">رابعة ابتدائي</option>
                <option value="خامسة ابتدائي">خامسة ابتدائي</option>
              </optgroup>
              <optgroup label="━━ المرحلة المتوسطة ━━">
                <option value="أولى متوسط">أولى متوسط</option>
                <option value="ثانية متوسط">ثانية متوسط</option>
                <option value="ثالثة متوسط">ثالثة متوسط</option>
                <option value="رابعة متوسط">رابعة متوسط</option>
              </optgroup>
              <optgroup label="━━ المرحلة الثانوية ━━">
                <option value="أولى ثانوي">أولى ثانوي</option>
                <option value="ثانية ثانوي">ثانية ثانوي</option>
                <option value="ثالثة ثانوي (بكالوريا)">ثالثة ثانوي (بكالوريا)</option>
              </optgroup>
            </select>
          </div>

          <!-- ولي الأمر -->
          <div class="form-group" id="parentGroup" style="display:none;">
            <div class="parent-card">
              <div class="parent-card-title">
                <span>👨‍👩‍👦</span>
                <span data-i18n="parentInfo">معلومات ولي الأمر</span>
              </div>
              <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                  <label class="form-label" for="parentName">
                    <span data-i18n="parentName">اسم ولي الأمر</span><span>*</span>
                  </label>
                  <input class="form-input" type="text" id="parentName">
                </div>
                <div class="form-group" style="margin-bottom:0">
                  <label class="form-label" for="parentPhone">
                    <span data-i18n="parentPhone">هاتف ولي الأمر</span><span>*</span>
                  </label>
                  <input class="form-input" type="tel" id="parentPhone" placeholder="+213...">
                </div>
              </div>
            </div>
          </div>

          <!-- نوع المترشح (متمدرس / حر) — بكالوريا فقط -->
          <div class="form-group" id="candidateTypeGroup" style="display:none;">
            <label class="form-label" data-i18n="candidateType">نوع المترشح</label>
            <div class="check-options">
              <label class="check-option" id="check-enrolled">
                <input type="radio" name="candidateType" value="متمدرس" onchange="onCandidateTypeChange()">
                <span class="check-box"></span>
                <span class="check-label" data-i18n="enrolled">متمدرس</span>
              </label>
              <label class="check-option" id="check-free">
                <input type="radio" name="candidateType" value="حر" onchange="onCandidateTypeChange()">
                <span class="check-box"></span>
                <span class="check-label" data-i18n="freeCandidate">حر</span>
              </label>
            </div>
          </div>

          <!-- التخصص -->
          <div class="form-group" id="specialtyGroup" style="display:none;">
            <label class="form-label" for="specialty">
              <span data-i18n="specialty">التخصص</span><span>*</span>
            </label>
            <select class="form-input" id="specialty" onchange="onSpecialtyChange()">
              <option value="">-- اختر التخصص --</option>
            </select>
          </div>

          <!-- المادة -->
          <div class="form-group" id="subjectGroup" style="display:none;">
            <label class="form-label" for="subject">
              <span data-i18n="subject">المادة</span><span>*</span>
            </label>
            <select class="form-input" id="subject" onchange="onSubjectChange()">
              <option value="">-- اختر المادة --</option>
            </select>
          </div>

          <!-- الأستاذ -->
          <div class="form-group" id="teacherGroup" style="display:none;">
            <label class="form-label" for="teacher">
              <span data-i18n="teacher">الأستاذ/ة</span><span>*</span>
            </label>
            <select class="form-input" id="teacher">
              <option value="">-- اختر الأستاذ/ة --</option>
            </select>
          </div>

          <!-- مستوى اللغة CEFR — دورات اللغات فقط -->
          <div class="form-group" id="langLevelGroup" style="display:none;">
            <label class="form-label" for="langLevel">
              <span data-i18n="langLevel">مستوى اللغة (CEFR)</span><span>*</span>
            </label>
            <select class="form-input" id="langLevel">
              <option value="">-- اختر المستوى --</option>
              <option value="A1" data-i18n-level="A1">A1 - مبتدئ</option>
              <option value="A2" data-i18n-level="A2">A2 - مبتدئ متقدم</option>
              <option value="B1" data-i18n-level="B1">B1 - متوسط</option>
              <option value="B2" data-i18n-level="B2">B2 - متوسط متقدم</option>
              <option value="C1" data-i18n-level="C1">C1 - متقدم</option>
              <option value="C2" data-i18n-level="C2">C2 - احترافي</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">
              <span data-i18n="phone">رقم الهاتف</span><span>*</span>
            </label>
            <input class="form-input" type="tel" id="phone" placeholder="+213..." required>
          </div>

          <div class="form-group">
            <label class="form-label" for="motivation">
              <span data-i18n="motivation">ما هو الدافع الذي جعلك تختار أكاديمية E-PLUS؟</span>
              <span style="color:rgba(255,255,255,0.5);font-weight:400" data-i18n="optional">(اختياري)</span>
            </label>
            <textarea class="form-input" id="motivation"></textarea>
          </div>

          <button type="submit" class="submit-btn">
            <span data-i18n="submitBtn">إرسال التسجيل ✦</span>
          </button>

        </form>
      </div>

      <div class="success-screen" id="success-view">
        <div style="position:relative;width:100%;display:flex;justify-content:center;">
          <div class="success-icon">✓</div>
        </div>
        <div class="success-title" data-i18n="successTitle">🎉 تم التسجيل بنجاح!</div>
        <p class="success-msg" data-i18n="successMsg">تم تسجيل معلوماتك بنجاح،<br>سيتم التواصل معك قريباً.</p>
        <button class="submit-btn" onclick="closeModal()" style="max-width:220px;margin-top:10px">
          <span data-i18n="closeBtn">العودة إلى الصفحة الرئيسية</span>
        </button>
      </div>

    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-left">
      <span>Developed by
        <a href="https://linktr.ee/thestvx" target="_blank" rel="noopener noreferrer" class="footer-brand">STVX</a>
      </span>
    </div>
    <div class="footer-center">
      <span>جميع الحقوق محفوظة لـ EDUCATION PLUS CENTER</span>
    </div>
    <div class="footer-right">
      <div class="footer-social">
        <a href="https://www.facebook.com/EducationPlusCenter" class="social-icon fb" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <img src="icons/facebook.png" alt="Facebook">
        </a>
        <a href="https://www.instagram.com/eplus_center_guemar/" class="social-icon ig" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="icons/instagram.png" alt="Instagram">
        </a>
        <a href="tel:0676431474" class="social-icon phone" aria-label="Phone">
          <img src="icons/phone.png" alt="Phone">
        </a>
        <a href="https://maps.app.goo.gl/Ei4duDb9QJZHgYFq9" class="social-icon location" target="_blank" rel="noopener noreferrer" aria-label="Location">
          <img src="icons/location.png" alt="Location">
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-PLUS Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- خلفية المربعات المتحركة -->
  <canvas id="squares-canvas" class="squares-bg"></canvas>

  <!-- الخلفية الأصلية -->
  <div class="bg-animated"></div>
  <div class="grid-pattern"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- تبديل اللغة -->
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ar')" id="btn-ar">🇸🇦 عربي</button>
    <button class="lang-btn"        onclick="setLang('en')" id="btn-en">🇬🇧 EN</button>
  </div>

  <!-- المحتوى الرئيسي -->
  <div class="main-content">

    <!-- اللوقو + العنوان -->
    <div class="logo-container">
      <div class="logo-image-wrapper">
        <img src="images/eplus-logo.jpg" alt="E-PLUS Center Logo" class="logo-image">
      </div>

      <div class="logo-badge" data-i18n="badge">✦ أكاديمية التعليم المتقدم ✦</div>
      
      <h1 class="logo-title split-text" data-text="E-PLUS">E-PLUS</h1>
      <p class="logo-title logo-title-sub split-text" data-text="Center">Center</p>
      
      <p class="logo-subtitle" data-i18n="subtitle">التسجيل في الدورات والبرامج التعليمية</p>
    </div>

    <!-- Pill Navigation -->
    <nav class="pill-nav">
      <div class="pill-slider"></div>
      <button class="pill-btn active" data-index="0" onclick="selectService('support')">
        <span class="pill-icon">📚</span>
        <span class="pill-label" data-i18n="btn1">تسجيلات الدعم</span>
      </button>
      <button class="pill-btn" data-index="1" onclick="selectService('lang')">
        <span class="pill-icon">🌐</span>
        <span class="pill-label" data-i18n="btn2">دورات اللغات</span>
      </button>
      <button class="pill-btn" data-index="2" onclick="selectService('vip')">
        <span class="pill-icon">⭐</span>
        <span class="pill-label" data-i18n="btn3">دروس VIP</span>
      </button>
    </nav>

  </div>

  <!-- النافذة المنبثقة -->
  <div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
    <div class="modal-box" id="modal-box">

      <div id="form-view">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">نموذج التسجيل</div>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>

        <form id="reg-form" onsubmit="submitForm(event)" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">
                <span data-i18n="firstName">الاسم</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="firstName" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">
                <span data-i18n="lastName">اللقب</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="lastName" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="birthDate">
                <span data-i18n="birthDate">تاريخ الميلاد</span><span>*</span>
              </label>
              <input class="form-input" type="date" id="birthDate" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="birthPlace">
                <span data-i18n="birthPlace">مكان الميلاد</span><span>*</span>
              </label>
              <input class="form-input" type="text" id="birthPlace" required>
            </div>
          </div>

          <!-- حقل مستوى اللغة - يظهر فقط لدورات اللغات -->
          <div class="form-group" id="langLevelGroup" style="display: none;">
            <label class="form-label" for="langLevel">
              <span data-i18n="langLevel">مستوى اللغة (CEFR)</span><span>*</span>
            </label>
            <select class="form-input" id="langLevel">
              <option value="" data-i18n="selectLevel">-- اختر المستوى --</option>
              <option value="A1">A1 - مبتدئ</option>
              <option value="A2">A2 - مبتدئ متقدم</option>
              <option value="B1">B1 - متوسط</option>
              <option value="B2">B2 - متوسط متقدم</option>
              <option value="C1">C1 - متقدم</option>
              <option value="C2">C2 - احترافي</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">
              <span data-i18n="phone">رقم الهاتف</span><span>*</span>
            </label>
            <input class="form-input" type="tel" id="phone" placeholder="+213..." required>
          </div>

          <div class="form-group">
            <label class="form-label" for="motivation">
              <span data-i18n="motivation">ما هو الدافع الذي جعلك تختار أكاديمية E-PLUS؟</span>
              <span style="color:rgba(255,255,255,0.5);font-weight:400" data-i18n="optional">(اختياري)</span>
            </label>
            <textarea class="form-input" id="motivation"></textarea>
          </div>

          <button type="submit" class="submit-btn">
            <span data-i18n="submitBtn">إرسال التسجيل ✦</span>
          </button>

        </form>
      </div>

      <div class="success-screen" id="success-view">
        <div style="position:relative;width:100%;display:flex;justify-content:center;">
          <div class="success-icon">✓</div>
        </div>
        <div class="success-title" data-i18n="successTitle">🎉 تم التسجيل بنجاح!</div>
        <p class="success-msg" data-i18n="successMsg">تم تسجيل معلوماتك بنجاح،<br>سيتم التواصل معك قريباً.</p>
        <button class="submit-btn" onclick="closeModal()" style="max-width:220px;margin-top:10px">
          <span data-i18n="closeBtn">العودة إلى الصفحة الرئيسية</span>
        </button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

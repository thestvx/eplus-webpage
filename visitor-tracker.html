<!-- ✅ تسجيل الزيارات — Realtime + Firestore ═══ -->
  <script type="module">
    import { initializeApp, getApps } from
      "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getDatabase, ref, increment, set, onDisconnect,
      onValue, serverTimestamp as rtServerTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAMcplfO4veFVLtZZcyqfTJx9NGCit8gjo",
      authDomain:        "eplus-center-39.firebaseapp.com",
      projectId:         "eplus-center-39",
      storageBucket:     "eplus-center-39.firebasestorage.app",
      messagingSenderId: "191532732034",
      appId:             "1:191532732034:web:b11449a2f0595db5d02e9b",
      databaseURL:       "https://eplus-center-39-default-rtdb.firebaseio.com"
    };

    // تجنب التهيئة المزدوجة
    const visApp = getApps().find(a => a.name === "visitor-app")
      || initializeApp(firebaseConfig, "visitor-app");

    const rtdb = getDatabase(visApp);
    const db   = getFirestore(visApp);

    // ── 1. إجمالي الزيارات (Realtime Database) ──
    const totalRef = ref(rtdb, "visitors/total");
    set(totalRef, increment(1));

    // ── 2. متصل الآن (Realtime Database — presence) ──
    const onlineRef    = ref(rtdb, "visitors/online");
    const myPresence   = ref(rtdb, "visitors/sessions/" + Date.now() + "_" + Math.random().toString(36).slice(2));

    // عند الاتصال: زيادة عداد المتصلين
    set(myPresence, true);
    set(onlineRef, increment(1));

    // عند قطع الاتصال: تقليل العداد وحذف الجلسة
    onDisconnect(myPresence).remove();
    onDisconnect(onlineRef).set(
      // نستخدم transaction لتقليل آمن، لكن onDisconnect لا يدعم increment
      // نضع 0 كـ fallback وسيتم إصلاحه من Cloud Functions إن وُجدت
      // الحل الأبسط: نعيد حساب من sessions
      null
    );

    // الحل الأفضل: نحسب المتصلين من sessions الحية
    const sessionsRef = ref(rtdb, "visitors/sessions");
    onValue(sessionsRef, snap => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      set(onlineRef, count);
    });

    // ── 3. سجل Firestore للتحليل الزمني ──
    try {
      await addDoc(collection(db, "pageViews"), {
        page:      "index",
        visitedAt: serverTimestamp(),
        userAgent: navigator.userAgent.slice(0, 100),
        lang:      navigator.language || "unknown"
      });
    } catch(e) {
      console.warn("pageViews log failed:", e);
    }
  </script>
